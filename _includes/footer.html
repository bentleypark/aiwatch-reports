<footer class="site-footer h-card">
  <div class="wrapper">
    <div class="footer-col-wrapper">
      <div class="footer-col">
        <p>{{ site.description | escape }}</p>
        <p>&copy; {{ site.time | date: '%Y' }} <a href="https://ai-watch.dev">AIWatch</a></p>
      </div>
    </div>
  </div>
</footer>
<script>
// GA4 event delegation — auto-track link clicks
document.addEventListener('click', function(e) {
  var a = e.target.closest('a');
  if (!a || typeof gtag !== 'function') return;
  var href = a.getAttribute('href') || '';
  var inFooter = !!a.closest('footer');
  var page = location.pathname.match(/\/(\d{4}-\d{2})\//)?.[1] || 'index';
  // ai-watch.dev links — classify by destination. After #264 migration, report
  // pages live at ai-watch.dev/reports/, so exclude any /reports/ path here to
  // avoid mis-classifying report-to-report navigation as dashboard clicks.
  // Trailing slash anchors the match to path-prefix, not hash (#reports-info).
  if (href.includes('ai-watch.dev') && !href.includes('/reports/')) {
    if (href.includes('#settings')) {
      gtag('event', 'click_cta_alerts', { location: 'reports_site', source: inFooter ? 'footer' : 'body', page: page });
    } else if (href.includes('#about-score')) {
      gtag('event', 'click_score_info', { location: 'reports_site', source: inFooter ? 'footer' : 'body', page: page });
    } else if (href.includes('#ranking')) {
      gtag('event', 'click_ranking', { location: 'reports_site', source: inFooter ? 'footer' : 'body', page: page });
    } else {
      gtag('event', 'click_dashboard', { location: 'reports_site', source: inFooter ? 'footer' : 'body', page: page });
    }
    return;
  }
  // Report link (monthly report pages)
  if (href.match(/\/\d{4}-\d{2}\//)) {
    gtag('event', 'click_report', { location: 'reports_site', report_month: href.match(/(\d{4}-\d{2})/)?.[1] || '', page: page });
  }
  // Service request link
  if (href.includes('service_request.md')) {
    gtag('event', 'click_request_service', { location: 'reports_site', page: page });
    return;
  }
  // GitHub link
  if (href.includes('github.com/bentleypark/aiwatch')) {
    gtag('event', 'click_github', { location: 'reports_site', page: page });
  }
});
</script>
