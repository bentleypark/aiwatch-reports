name: Generate Monthly Report Draft

# Triggered manually after the AIWatch Worker cron creates archive:monthly:{YYYY-MM}
# (1st of the following month at 00:00 UTC). The Worker posts a Discord webhook with
# a link to this workflow's dispatch page; operator clicks "Run workflow" and enters
# the month to generate a draft PR.
#
# workflow_dispatch ONLY — no scheduled runs. Archive data quality is operator-verified
# before draft generation.

on:
  workflow_dispatch:
    inputs:
      month:
        description: 'Report month (YYYY-MM). Leave empty for previous calendar month.'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve report month
        id: month
        env:
          INPUT_MONTH: ${{ github.event.inputs.month }}
        run: |
          if [ -n "$INPUT_MONTH" ]; then
            if ! echo "$INPUT_MONTH" | grep -qE '^[0-9]{4}-[0-9]{2}$'; then
              echo "::error::Month must be YYYY-MM format (got: $INPUT_MONTH)"
              exit 1
            fi
            MONTH="$INPUT_MONTH"
          else
            MONTH=$(date -u -d "$(date -u +%Y-%m-01) -1 day" +%Y-%m)
          fi
          echo "month=$MONTH" >> "$GITHUB_OUTPUT"
          echo "Generating draft for $MONTH"

      - name: Generate report draft
        env:
          MONTH: ${{ steps.month.outputs.month }}
        run: node scripts/generate-report.js "$MONTH"

      - name: Generate charts
        env:
          MONTH: ${{ steps.month.outputs.month }}
        run: node scripts/generate-charts.js "${MONTH}/index.md"

      - name: Snapshot archive JSON to _data/ (#15)
        # Persists /api/report?month=YYYY-MM as _data/{MONTH}.json for long-term
        # git preservation alongside the KV archive — see _data/README.md for
        # provenance + rebuild caveats.
        env:
          MONTH: ${{ steps.month.outputs.month }}
        run: bash scripts/fetch-archive.sh "$MONTH"

      - name: Update top-level index.md (#15)
        # Inserts/refreshes the entry for $MONTH in the front-page Reports list
        # using services count + daysCollected from the snapshot above. Idempotent.
        env:
          MONTH: ${{ steps.month.outputs.month }}
        run: node scripts/update-index.js "$MONTH"

      - name: Create branch + draft PR
        env:
          MONTH: ${{ steps.month.outputs.month }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          BRANCH="report/${MONTH}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Reset local state to remote branch when it exists, so re-runs for the same
          # month start from a clean baseline instead of failing the push as non-fast-forward.
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            git fetch origin "$BRANCH:$BRANCH"
            git checkout "$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

          # _data/${MONTH}.json (snapshot) and index.md (Reports list entry) are added
          # alongside the report file + assets so the draft PR is self-contained — #15.
          git add "${MONTH}/" "assets/${MONTH}/" "_data/${MONTH}.json" index.md 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "::notice::No changes vs previous draft — skipping commit"
            exit 0
          fi

          git commit -m "chore: generate ${MONTH} report draft"
          # Force-with-lease is safe here: the branch is bot-owned (auto-generated from
          # the archive) and carries no human commits. A re-run is expected to replace it.
          git push --force-with-lease origin "$BRANCH"

          # Reuse existing PR if one is already open for this branch (idempotent re-runs).
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Existing draft PR #$EXISTING updated."
            echo "::notice::Updated existing draft PR #$EXISTING"
          else
            gh pr create \
              --draft \
              --base main \
              --head "$BRANCH" \
              --title "report: ${MONTH} monthly reliability report (draft)" \
              --body "Auto-generated draft for ${MONTH}.

              **Before merging:**
              1. Fill narrative sections: Summary, Recommendations, Key Insight, Notable Incidents, Observations
              2. Verify Incident Summary counts against source status pages
              3. Flip \`published: false\` → \`published: true\` in the frontmatter
              4. Mark this PR as ready for review (un-draft)

              Generated by \`.github/workflows/generate-report.yml\` from \`archive:monthly:${MONTH}\`."
            echo "::notice::Draft PR created for ${MONTH}"
          fi
