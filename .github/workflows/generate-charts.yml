name: Generate Monthly Charts

on:
  # workflow_dispatch only — charts are normally generated as part of
  # generate-report.yml when an operator triggers a monthly report draft.
  # This workflow remains as an opt-in chart-only re-run tool (e.g. when an
  # operator updates the report frontmatter and needs to regenerate SVGs
  # without re-running the full report draft pipeline).
  #
  # No `schedule:` trigger — that was removed because it ran on the 1st of
  # the month before the operator had a chance to trigger generate-report.yml,
  # so the existence check at "Report not found: {prev-month}/index.md" failed
  # every month (#12).
  workflow_dispatch:
    inputs:
      report_path:
        description: 'Report file path (e.g., 2026-04/index.md)'
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine report path
        id: report
        env:
          INPUT_PATH: ${{ github.event.inputs.report_path }}
        run: |
          if [ -n "$INPUT_PATH" ]; then
            echo "path=$INPUT_PATH" >> "$GITHUB_OUTPUT"
          else
            PREV_MONTH=$(date -d "yesterday" +%Y-%m)
            echo "path=${PREV_MONTH}/index.md" >> "$GITHUB_OUTPUT"
          fi

      - name: Check report exists
        env:
          REPORT_PATH: ${{ steps.report.outputs.path }}
        run: |
          if [ ! -f "$REPORT_PATH" ]; then
            echo "Report not found: $REPORT_PATH"
            exit 1
          fi

      - name: Generate charts
        env:
          REPORT_PATH: ${{ steps.report.outputs.path }}
        run: node scripts/generate-charts.js "$REPORT_PATH"

      - name: Commit and push
        env:
          REPORT_PATH: ${{ steps.report.outputs.path }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            MONTH_KEY=$(echo "$REPORT_PATH" | grep -oE '[0-9]{4}-[0-9]{2}')
            if [ -z "$MONTH_KEY" ]; then
              echo "::error::Could not extract month key from path"
              exit 1
            fi
            git commit -m "chore: generate ${MONTH_KEY} chart SVGs"
            git push
          fi
